<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="CSS/Style_Register.css">
</head>

<body>
    <main class="container">
        <section class="card" aria-labelledby="register-heading">
            <div class="brand">
                <img src="images/WatTn.png" alt="WatTn logo">
                <h1 id="register-heading">ពុទ្ធិកបឋមសិក្សាសម្ដេចព្រះអភិសិរីធម្មិការាម</h1>
            </div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="nameKH">Name KH</label>
                    <input type="text" id="nameKH" name="nameKH" minlength="3" placeholder="Enter your name in Khmer"
                        required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" minlength="3" placeholder="Enter your username"
                        required>
                </div>
                <div class="form-group">
                    <label for="dob">DOB</label>
                    <input type="text" id="dob" name="dob" minlength="3" placeholder="Enter your date of birth"
                        required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <input type="text" id="gender" name="gender" minlength="3" placeholder="Enter your gender"
                        required>
                </div>
                

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" minlength="6"
                        placeholder="Choose a secure password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" minlength="6"
                        placeholder="Confirm your password" required>
                </div>

                <button type="submit">Register</button>
                <p class="helper">Already have an account? <a href="index.html">Login here</a></p>
                <div id="message" class="message" role="status" aria-live="polite" hidden></div>
            </form>
        </section>
    </main>
    <script src="JS/Register.js"></script>
</body>

</html>
